<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basecamp: Ancient Paths</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Alfa+Slab+One&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2D4739; --secondary: #B85C38; --accent: #F2C14E; --neutral: #4A4A4A; --bg: #F9F7F2; --white: #FFFFFF; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); background-image: repeating-linear-gradient(45deg, rgba(45, 71, 57, 0.02) 0px, rgba(45, 71, 57, 0.02) 2px, transparent 2px, transparent 10px); color: var(--neutral); margin: 0; padding: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; background: var(--primary); color: var(--accent); border: 2px solid var(--accent); padding: 10px 15px; border-radius: 4px; cursor: pointer; z-index: 1001; font-family: 'Archivo Black', sans-serif; font-size: 0.75rem; }
        #nav-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--primary); z-index: 1000; transition: 0.4s; padding-top: 80px; text-align: left; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        #nav-menu.active { left: 0; }
        #nav-menu a { display: block; padding: 18px 25px; color: var(--bg); text-decoration: none; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        .header-container { width: 100%; background: var(--primary); border-bottom: 5px solid var(--secondary); line-height: 0; }
        .header-img { width: 100%; height: auto; max-width: 1080px; display: block; margin: 0 auto; }
        .content { padding: 15px; max-width: 95%; margin: 0 auto; text-align: center; box-sizing: border-box; }
        h1 { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; color: var(--primary); font-size: clamp(1.4rem, 5vw, 2rem); margin: 20px 0; }
        h3 { font-family: 'Alfa Slab One', cursive; color: var(--secondary); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 15px; }
        .card { background: var(--white); border-radius: 8px; padding: 25px 15px; margin-bottom: 30px; border: 1px solid #E0DED7; box-shadow: 0 4px 0px rgba(0,0,0,0.1); box-sizing: border-box; overflow: hidden; }
        .checklist { text-align: left; list-style: none; padding: 0; margin: 0; }
        .checklist li { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #F0EFEA; font-weight: 700; color: var(--primary); }
        .checklist input { width: 24px; height: 24px; margin-right: 15px; accent-color: var(--secondary); cursor: pointer; }
        .checklist input:checked + span { text-decoration: line-through; opacity: 0.5; }
        iframe { border: 4px solid var(--primary); border-radius: 4px; width: 100%; background: #EEEADF; display: block; }
        .video-frame { height: 350px; }
        .quizlet-frame { height: 650px; }
        .log-input { width: 100%; height: 120px; border: 2px solid #EEEADF; padding: 10px; font-family: inherit; resize: none; border-radius: 4px; box-sizing: border-box; }
        .btn { display: inline-block; background: var(--secondary); color: var(--bg); padding: 16px 28px; border-radius: 4px; font-family: 'Archivo Black', sans-serif; text-transform: uppercase; border: none; cursor: pointer; box-shadow: 0 4px 0 #8A452A; margin: 10px; text-decoration: none; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8A452A; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(45, 71, 57, 0.9); }
        .modal-content { background: var(--bg); margin: 5% auto; padding: 30px; width: 85%; max-width: 500px; border: 8px solid var(--primary); border-radius: 4px; max-height: 80vh; overflow-y: auto; text-align: left; }
        .nav-controls { display: flex; justify-content: space-between; padding-bottom: 50px; }
        @media (max-width: 600px) { .content { padding: 10px 0; } .card { border-radius: 0; border-left: none; border-right: none; } }
    </style>
</head>
<body>
    <button class="menu-btn" onclick="toggleMenu()">☰ MENU</button>
    <nav id="nav-menu">
        <h3 style="color: var(--accent); padding-left: 25px;">Trail Map</h3>
        <a href="#" onclick="loadLesson(0)">Week 1: Adventure Begins</a>
        <a href="#" onclick="loadLesson(1)">Week 2: Into the Woods</a>
    </nav>
    <div class="header-container"><img src="images/header.png" alt="Basecamp" class="header-img"></div>
    <div class="content">
        <h1 id="lesson-title">Loading...</h1>
        <div class="card" style="border-top: 6px solid var(--primary);">
            <h3>✅ My Mission</h3>
            <ul class="checklist">
                <li><input type="checkbox" id="check-video" onchange="saveProgress()"> <span>Watch Field Briefing</span></li>
                <li><input type="checkbox" id="check-bible" onchange="saveProgress()"> <span>Read Ancient Paths</span></li>
                <li><input type="checkbox" id="check-study" onchange="saveProgress()"> <span>Study Flashcards</span></li>
                <li><input type="checkbox" id="check-match" onchange="saveProgress()"> <span>Win Match Game</span></li>
            </ul>
        </div>
        <div class="card">
            <h3>📖 Ancient Paths</h3>
            <p id="bible-ref-display" style="font-weight:bold; font-size: 1.3rem; color: var(--primary);"></p>
            <button class="btn" onclick="showBible()" style="background:var(--primary); box-shadow: 0 4px 0 #1B2B22;">Open Scroll</button>
        </div>
        <div class="card"><h3>📺 Field Briefing</h3><iframe id="video-frame" class="video-frame" src="" allowfullscreen></iframe></div>
        <div class="card"><h3>📝 Step 1: Flashcards</h3><iframe id="quizlet-flash" class="quizlet-frame" src="" allowfullscreen></iframe></div>
        <div class="card"><h3>🎮 Step 2: Match Game</h3><iframe id="quizlet-match" class="quizlet-frame" src="" allowfullscreen></iframe></div>
        <div class="card" style="background: #EEEADF;"><h3>📓 Leader's Log</h3><textarea id="leaders-log" class="log-input" placeholder="Notes from the trail..." oninput="saveProgress()"></textarea></div>
        <div class="nav-controls">
            <button class="btn" id="prev-btn" onclick="prevLesson()" style="background:var(--neutral); box-shadow: 0 4px 0 #222;">← Back</button>
            <button class="btn" id="next-btn" onclick="nextLesson()">Next →</button>
        </div>
    </div>
    <div id="bibleModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-weight:bold; color: var(--secondary);" onclick="closeBibleModal()">CLOSE X</span>
            <h2 id="modal-ref" style="font-family: 'Alfa Slab One', cursive; color: var(--secondary);"></h2>
            <div id="modal-body" style="line-height:1.8;"></div>
            <button class="btn" style="width:100%; margin-top:20px;" onclick="closeBibleModal()">Done Reading</button>
        </div>
    </div>
    <script>
        const lessons = [
            { title: "Week 1: Adventure Begins", video: "https://www.youtube.com/embed/dQw4w9WgXcQ", bibleRef: "Genesis 1:1-2:3", bibleUrl: "https://www.biblegateway.com/passage/?search=Genesis+1%3A1-2%3A3&version=WEB", flashcards: "https://quizlet.com/1156634382/flashcards/embed", match: "https://quizlet.com/1156634382/match/embed" },
            { title: "Week 2: Into the Woods", video: "https://www.youtube.com/embed/WATCH_ID", bibleRef: "Exodus 3", bibleUrl: "https://www.biblegateway.com/passage/?search=Exodus+3&version=WEB", flashcards: "https://quizlet.com/SET_ID/flashcards/embed", match: "https://quizlet.com/SET_ID/match/embed" }
        ];
        let currentIdx = 0;
        function toggleMenu() { document.getElementById('nav-menu').classList.toggle('active'); }
        function saveProgress() {
            const data = { v: document.getElementById('check-video').checked, b: document.getElementById('check-bible').checked, s: document.getElementById('check-study').checked, m: document.getElementById('check-match').checked, l: document.getElementById('leaders-log').value };
            localStorage.setItem(`basecamp_w${currentIdx}`, JSON.stringify(data));
        }
        function loadLesson(idx) {
            currentIdx = idx; const l = lessons[idx];
            document.getElementById('lesson-title').innerText = l.title;
            document.getElementById('video-frame').src = l.video;
            document.getElementById('quizlet-flash').src = l.flashcards;
            document.getElementById('quizlet-match').src = l.match;
            document.getElementById('bible-ref-display').innerText = l.bibleRef;
            const saved = JSON.parse(localStorage.getItem(`basecamp_w${idx}`) || '{}');
            document.getElementById('check-video').checked = saved.v || false;
            document.getElementById('check-bible').checked = saved.b || false;
            document.getElementById('check-study').checked = saved.s || false;
            document.getElementById('check-match').checked = saved.m || false;
            document.getElementById('leaders-log').value = saved.l || "";
            document.getElementById('nav-menu').classList.remove('active');
            window.scrollTo(0,0);
        }
        async function showBible() {
            const l = lessons[currentIdx];
            document.getElementById('bibleModal').style.display = 'block';
            document.getElementById('modal-ref').innerText = l.bibleRef;
            document.getElementById('modal-body').innerText = "Unrolling the scroll...";
            try {
                const res = await fetch(`https://bible-api.com/${l.bibleRef}?translation=web`);
                const data = await res.json();
                document.getElementById('modal-body').innerText = data.text;
            } catch(e) {
                document.getElementById('modal-body').innerHTML = `Failed to load. <a href="${l.bibleUrl}" target="_blank">View on Bible Gateway</a>`;
            }
        }
        function closeBibleModal() { document.getElementById('bibleModal').style.display = 'none'; }
        function nextLesson() { if(currentIdx < lessons.length - 1) loadLesson(currentIdx + 1); }
        function prevLesson() { if(currentIdx > 0) loadLesson(currentIdx - 1); }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        loadLesson(0);
    </script>
</body>
</html>
