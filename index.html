<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basecamp: Ancient Paths</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Alfa+Slab+One&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2D4739;   /* Deep Forest */
            --secondary: #B85C38; /* Burnt Ochre */
            --accent: #F2C14E;    /* Summit Gold */
            --neutral: #4A4A4A;   /* Granite Gray */
            --bg: #F9F7F2;        /* Parchment */
            --white: #FFFFFF;
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg); 
            /* Subtle topographic feel using a repeating linear gradient */
            background-image: repeating-linear-gradient(45deg, rgba(45, 71, 57, 0.02) 0px, rgba(45, 71, 57, 0.02) 2px, transparent 2px, transparent 10px);
            color: var(--neutral); 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }
        
        /* Typography */
        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: -1px;
            color: var(--primary); 
            margin: 20px 0; 
            font-size: 1.8rem; 
        }

        h3 { 
            font-family: 'Alfa Slab One', cursive; 
            color: var(--secondary); 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 15px; 
        }

        /* Navigation Menu - The "Ranger Station" */
        #nav-menu { 
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%; 
            background: var(--primary); 
            box-shadow: 5px 0 15px rgba(0,0,0,0.3); 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; padding-top: 80px; text-align: left; 
        }
        #nav-menu h3 { color: var(--accent); padding-left: 25px; }
        #nav-menu a { 
            display: block; padding: 18px 25px; text-decoration: none; 
            color: var(--bg); border-bottom: 1px solid rgba(249, 247, 242, 0.1); 
            font-weight: 700; font-size: 0.9rem;
        }
        #nav-menu.active { left: 0; }

        .menu-btn { 
            position: fixed; top: 15px; left: 15px; 
            background: var(--primary); color: var(--accent); 
            border: 2px solid var(--accent); padding: 10px 15px; 
            border-radius: 4px; cursor: pointer; z-index: 1001; 
            font-family: 'Archivo Black', sans-serif; font-size: 0.8rem;
        }

        /* Header Image */
        .header-container { 
            width: 100%; background: var(--primary); border-bottom: 5px solid var(--secondary);
            line-height: 0; 
        }
        .header-img { width: 100%; height: auto; max-width: 1080px; display: block; margin: 0 auto; }

        .content { padding: 25px; max-width: 600px; margin: 0 auto; }
        
        /* Cards - "The Gear" */
        .card { 
            background: var(--white); border-radius: 8px; padding: 25px; 
            box-shadow: 0 4px 0px rgba(0,0,0,0.1); /* Flat, sturdy shadow */
            margin-bottom: 30px; border: 1px solid #E0DED7; 
            position: relative;
        }

        /* Checklist - "Trail Stamps" */
        .checklist { text-align: left; list-style: none; padding: 0; margin: 0; }
        .checklist li { 
            display: flex; align-items: center; padding: 12px 0; 
            border-bottom: 1px solid #F0EFEA; font-weight: 700; color: var(--primary);
        }
        .checklist input[type="checkbox"] { 
            width: 24px; height: 24px; margin-right: 15px; 
            accent-color: var(--secondary); cursor: pointer; 
        }
        .checklist input:checked + span { color: var(--neutral); text-decoration: line-through; opacity: 0.6; }

        /* Buttons - "Utility Gear" */
        .btn { 
            display: inline-block; background: var(--secondary); color: var(--bg); 
            padding: 16px 28px; text-decoration: none; border-radius: 4px; 
            font-family: 'Archivo Black', sans-serif; font-size: 0.9rem;
            text-transform: uppercase; margin: 10px; border: none; cursor: pointer; 
            box-shadow: 0 4px 0 #8A452A; transition: all 0.1s;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8A452A; }

        /* Modal - "The Map Room" */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(45, 71, 57, 0.9); }
        .modal-content { 
            background-color: var(--bg); margin: 5% auto; padding: 35px; 
            border-radius: 4px; width: 85%; max-width: 500px; max-height: 80vh; 
            overflow-y: auto; border: 10px solid var(--primary);
        }
        #modal-body { font-size: 1.2rem; line-height: 1.8; color: var(--neutral); }
        #modal-ref { font-family: 'Alfa Slab One', cursive; color: var(--secondary); }

        /* Navigation Controls */
        .nav-controls { display: flex; justify-content: space-between; margin-top: 40px; }
        .hidden { visibility: hidden; }

        iframe { border: 4px solid var(--primary); border-radius: 4px; background: #EEEADF; }
    </style>
</head>

<body>

  <button class="menu-btn" onclick="toggleMenu()">☰ MENU</button>

  <nav id="nav-menu">
    <h3 style="padding-left: 25px; color: var(--primary);">Basecamp Lessons</h3>
    <a href="#" onclick="loadLesson(0)">Week 1: Adventure Begins</a>
    <a href="#" onclick="loadLesson(1)">Week 2: Into the Woods</a>
  </nav>

  <div class="header-container">
    <img src="images/header.png" alt="Basecamp" class="header-img">
  </div>

  <div class="content">
    <h1 id="lesson-title">Loading...</h1>

    <div class="card">
      <h3>📖 Bible Reading</h3>
      <p id="bible-ref-text" style="font-weight:bold; color: var(--accent);"></p>
      <button id="bible-btn" class="btn" style="background: var(--accent);" onclick="toggleBible()">Open
        Scripture</button>
      <div id="bible-container">
        <iframe id="bible-frame" src="" class="bible-frame"></iframe>
      </div>
    </div>

    <div class="card">
      <h3>📺 Video Lesson</h3>
      <div id="video-container">
        <iframe id="video-frame" width="100%" height="315" src="" title="YouTube video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen style="border-radius:15px;"></iframe>
      </div>
    </div>

    <div class="card">
      <h3>🧠 Game Challenge</h3>
      <iframe id="quizlet-game" src="" class="app-frame" allowfullscreen></iframe>
    </div>

    <div class="nav-controls">
      <button class="btn" id="prev-btn" onclick="prevLesson()" style="background: #999;">← Back</button>
      <button class="btn" id="next-btn" onclick="nextLesson()">Next Week →</button>
    </div>
  </div>

  <script>
    const lessons = [
      {
        title: "Week 1: Adventure Begins",
        // Make sure the link has /embed/ in it!
        video: "https://www.youtube.com/embed/dQw4w9WgXcQ",
        bibleRef: "Genesis 1:1-2:3",
        bibleUrl: "https://www.biblegateway.com/passage/?search=Genesis+1%3A1-2%3A3&version=WEB",
        quizlet: "https://quizlet.com/1156634382/flashcards/embed?i=72vrag&x=1jj1"
      },
      {
        title: "Week 2: Into the Woods",
        video: "https://www.youtube.com/embed/dQw4w9WgXcQ",
        bibleRef: "Exodus 3",
        bibleUrl: "https://www.biblegateway.com/passage/?search=Exodus+3&version=WEB",
        quizlet: "https://quizlet.com/1156634382/flashcards/embed?i=72vrag&x=1jj1"
      }
    ];

    let currentIdx = 0;

    // This function now handles both Opening and Closing
        function toggleBible() {
            const container = document.getElementById('bible-container');
            const btn = document.getElementById('bible-btn');
            
            if (container.style.display === 'block') {
                container.style.display = 'none';
                btn.innerText = 'Open Scripture';
                btn.style.background = 'var(--accent)'; // Back to purple
            } else {
                container.style.display = 'block';
                btn.innerText = 'Close Scripture';
                btn.style.background = '#666'; // Change color to gray when open
            }
        }

        function loadLesson(index) {
            const lesson = lessons[index];
            currentIdx = index;

            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('video-frame').src = lesson.video;
            
            // Set Bible Info
            document.getElementById('bible-ref-text').innerText = lesson.bibleRef;
            document.getElementById('bible-frame').src = lesson.bibleUrl;
            
            // RESET: Always hide Bible and reset button text when moving to a NEW lesson
            document.getElementById('bible-container').style.display = 'none'; 
            document.getElementById('bible-btn').innerText = 'Open Scripture';
            document.getElementById('bible-btn').style.background = 'var(--accent)';
            
            document.getElementById('quizlet-game').src = lesson.quizlet;
            
            document.getElementById('prev-btn').style.visibility = (index === 0) ? 'hidden' : 'visible';
            document.getElementById('next-btn').style.visibility = (index === lessons.length - 1) ? 'hidden' : 'visible';
            
            toggleMenu(false);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

    function nextLesson() { if (currentIdx < lessons.length - 1) loadLesson(currentIdx + 1); }
    function prevLesson() { if (currentIdx > 0) loadLesson(currentIdx - 1); }
    function toggleMenu(open) {
      const menu = document.getElementById('nav-menu');
      if (open === false) menu.classList.remove('active');
      else menu.classList.toggle('active');
    }

    loadLesson(0);

      if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Trail Map Loaded (Service Worker Registered)"))
      .catch(err => console.log("Service Worker Failed", err));
}
  </script>
</body>

</html>
