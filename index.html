<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basecamp Kids</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c5f2d; --secondary: #ff7f50; --accent: #6b5b95; --bg: #f0f7ff; }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 0; text-align: center; }
        
        /* Navigation Menu */
        #nav-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; padding-top: 60px; text-align: left; }
        #nav-menu a { display: block; padding: 15px 25px; text-decoration: none; color: #333; border-bottom: 1px solid #eee; font-weight: 500; }
        #nav-menu.active { left: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 1001; font-weight: bold; }

        /* Header */
        .header-container { width: 100%; overflow: hidden; background: var(--primary); line-height: 0; }
        .header-img { width: 100%; height: auto; max-width: 1080px; display: block; margin: 0 auto; }

        .content { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border: 1px solid #eef2f5; overflow: hidden; }
        h1 { color: var(--primary); margin: 15px 0; font-size: 1.6rem; }
        h3 { margin-top: 0; color: #555; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        .btn { display: inline-block; background: var(--secondary); color: white; padding: 14px 24px; text-decoration: none; border-radius: 30px; font-weight: bold; margin: 10px; border: none; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }

        /* Frames */
        iframe { border: 0; border-radius: 15px; width: 100%; background: #f9f9f9; display: block; }
        .video-frame { height: 315px; }
        .quizlet-frame { height: 500px; margin-bottom: 15px; } /* Added margin for stacking */

        /* Modal Styling */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 25px; border-radius: 20px; width: 85%; max-width: 500px; max-height: 70vh; overflow-y: auto; text-align: left; position: relative; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
        .close-modal { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        #modal-body { line-height: 1.7; font-size: 1.15rem; color: #444; }

        .nav-controls { display: flex; justify-content: space-between; margin: 20px 0 40px 0; }
        .hidden { visibility: hidden; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰ MENU</button>

    <nav id="nav-menu">
        <h3 style="padding-left: 25px; color: var(--primary);">Basecamp Lessons</h3>
        <a href="#" onclick="loadLesson(0)">Week 1: Adventure Begins</a>
        <a href="#" onclick="loadLesson(1)">Week 2: Into the Woods</a>
    </nav>

    <div class="header-container">
        <img src="images/header.png" alt="Basecamp" class="header-img">
    </div>

    <div class="content">
        <h1 id="lesson-title">Loading...</h1>

        <div class="card">
            <h3>📖 Bible Reading</h3>
            <p id="bible-ref-display" style="font-weight:bold; font-size: 1.2rem; color: var(--accent);"></p>
            <button class="btn" style="background: var(--accent);" onclick="showBible()">Read Scripture</button>
        </div>

        <div class="card">
            <h3>📺 Video Lesson</h3>
            <iframe id="video-frame" class="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="card">
            <h3>🧠 Game Challenges</h3>
            <iframe id="quizlet-game-1" src="" class="quizlet-frame" allowfullscreen></iframe>
            <iframe id="quizlet-game-2" src="" class="quizlet-frame" allowfullscreen></iframe>
        </div>

        <div class="nav-controls">
            <button class="btn" id="prev-btn" onclick="prevLesson()" style="background: #999;">← Back</button>
            <button class="btn" id="next-btn" onclick="nextLesson()">Next Week →</button>
        </div>
    </div>

    <div id="bibleModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeBibleModal()">&times;</span>
            <h2 id="modal-ref" style="color: var(--primary); margin-top: 0;"></h2>
            <div id="modal-loading" style="font-style: italic; color: #888;">Opening the scroll...</div>
            <div id="modal-body"></div>
            <button class="btn" style="width: 100%; margin-top: 20px;" onclick="closeBibleModal()">Done Reading</button>
        </div>
    </div>

    <script>
        const lessons = [
            {
                title: "Week 1: Adventure Begins",
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ", 
                bibleRef: "Genesis 1:1-2:3",
                bibleUrl: "https://www.biblegateway.com/passage/?search=Genesis+1%3A1-2%3A3&version=WEB",
                // Two separate Quizlet links
                quizlet1: "https://quizlet.com/1156634382/flashcards/embed?i=72vrag&x=1jj1",
                quizlet2: "https://quizlet.com/1156634382/match/embed?i=72vrag&x=1jj1"
            },
            {
                title: "Week 2: Into the Woods",
                video: "https://www.youtube.com/embed/WATCH_ID_2",
                bibleRef: "Exodus 3",
                bibleUrl: "https://www.biblegateway.com/passage/?search=Exodus+3&version=WEB",
                quizlet1: "https://quizlet.com/YOUR_SET_ID_A/flashcards/embed",
                quizlet2: "https://quizlet.com/YOUR_SET_ID_B/match/embed"
            }
        ];

        let currentIdx = 0;

        async function showBible() {
            const modal = document.getElementById('bibleModal');
            const modalBody = document.getElementById('modal-body');
            const modalRef = document.getElementById('modal-ref');
            const loading = document.getElementById('modal-loading');
            const lesson = lessons[currentIdx];

            modal.style.display = "block";
            modalRef.innerText = lesson.bibleRef;
            modalBody.innerText = "";
            loading.style.display = "block";

            try {
                const response = await fetch(`https://bible-api.com/${lesson.bibleRef}?translation=web`);
                const data = await response.json();
                loading.style.display = "none";
                modalBody.innerText = data.text || "Text not found.";
            } catch (error) {
                loading.style.display = "none";
                modalBody.innerHTML = `Oops! Scripture failed to load.<br><br><a href="${lesson.bibleUrl}" target="_blank" style="color:var(--accent);">Click here to read on BibleGateway</a>`;
            }
        }

        function closeBibleModal() { document.getElementById('bibleModal').style.display = "none"; }

        function loadLesson(index) {
            const lesson = lessons[index];
            currentIdx = index;

            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('video-frame').src = lesson.video;
            
            // Loading both Quizlets
            document.getElementById('quizlet-game-1').src = lesson.quizlet1;
            document.getElementById('quizlet-game-2').src = lesson.quizlet2;
            
            document.getElementById('bible-ref-display').innerText = lesson.bibleRef;
            
            document.getElementById('prev-btn').style.visibility = (index === 0) ? 'hidden' : 'visible';
            document.getElementById('next-btn').style.visibility = (index === lessons.length - 1) ? 'hidden' : 'visible';
            
            toggleMenu(false);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function nextLesson() { if(currentIdx < lessons.length - 1) loadLesson(currentIdx + 1); }
        function prevLesson() { if(currentIdx > 0) loadLesson(currentIdx - 1); }
        
        function toggleMenu(open) {
            const menu = document.getElementById('nav-menu');
            if (open === false) menu.classList.remove('active');
            else menu.classList.toggle('active');
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('bibleModal')) closeBibleModal();
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        loadLesson(0);
    </script>
</body>
</html>
