<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basecamp Kids</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c5f2d; --secondary: #ff7f50; --accent: #6b5b95; --bg: #f0f7ff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 0; text-align: center; }
        
        /* Navigation Menu */
        #nav-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; padding-top: 60px; text-align: left; }
        #nav-menu a { display: block; padding: 15px 25px; text-decoration: none; color: #333; border-bottom: 1px solid #eee; font-weight: 500; }
        #nav-menu.active { left: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 1001; font-weight: bold; }

        .header-container { width: 100%; overflow: hidden; background: var(--primary); line-height: 0; }
        .header-img { width: 100%; height: auto; max-width: 1080px; display: block; margin: 0 auto; }
        .content { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; border: 1px solid #eef2f5; overflow: hidden; }
        h1 { color: var(--primary); margin: 15px 0; font-size: 1.6rem; }
        h3 { margin-top: 0; color: #555; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        .btn { display: inline-block; background: var(--secondary); color: white; padding: 14px 24px; text-decoration: none; border-radius: 30px; font-weight: bold; margin: 10px; border: none; cursor: pointer; }
        
        /* Frame Styling - Ensures they are visible */
        iframe { border: 0; border-radius: 15px; width: 100%; background: #f9f9f9; display: block; }
        .video-frame { height: 315px; }
        .quizlet-frame { height: 500px; }
        .bible-frame { height: 500px; margin-top: 15px; }

        .nav-controls { display: flex; justify-content: space-between; margin: 20px 0 40px 0; }
        .hidden { visibility: hidden; }
        #bible-container { display: none; } 
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰ MENU</button>

    <nav id="nav-menu">
        <h3 style="padding-left: 25px; color: var(--primary);">Basecamp Lessons</h3>
        <a href="#" onclick="loadLesson(0)">Week 1: Adventure Begins</a>
        <a href="#" onclick="loadLesson(1)">Week 2: Into the Woods</a>
    </nav>

    <div class="header-container">
        <img src="images/header.png" alt="Basecamp" class="header-img">
    </div>

    <div class="content">
        <h1 id="lesson-title">Loading...</h1>

        <div class="card">
            <h3>📺 Video Lesson</h3>
            <iframe id="video-frame" class="video-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="card">
            <h3>📖 Bible Reading</h3>
            <p id="bible-ref-text" style="font-weight:bold; color: var(--accent);"></p>
            <button class="btn" style="background: var(--accent);" onclick="showBible()">Open Scripture</button>
            <div id="bible-container">
                <iframe id="bible-frame" src="" class="bible-frame"></iframe>
            </div>
        </div>

        <div class="card">
            <h3>🧠 Game Challenge</h3>
            <iframe id="quizlet-game" src="" class="quizlet-frame" allowfullscreen></iframe>
        </div>

        <div class="nav-controls">
            <button class="btn" id="prev-btn" onclick="prevLesson()" style="background: #999;">← Back</button>
            <button class="btn" id="next-btn" onclick="nextLesson()">Next Week →</button>
        </div>
    </div>

    <script>
        const lessons = [
            {
                title: "Week 1: Adventure Begins",
                // MUST BE THE EMBED LINK (has /embed/ in the URL)
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ", 
                bibleRef: "Genesis 1:1-2:3",
                bibleUrl: "https://www.biblegateway.com/passage/?search=Genesis+1%3A1-2%3A3&version=WEB",
                quizlet: "https://quizlet.com/1156634382/flashcards/embed?i=72vrag&x=1jj1"
            },
            {
                title: "Week 2: Into the Woods",
                video: "https://www.youtube.com/embed/WATCH_ID_HERE",
                bibleRef: "Exodus 3",
                bibleUrl: "https://www.biblegateway.com/passage/?search=Exodus+3&version=WEB",
                quizlet: "https://quizlet.com/YOUR_SET_ID/flashcards/embed"
            }
        ];

        let currentIdx = 0;

        function showBible() {
            document.getElementById('bible-container').style.display = 'block';
        }

        function loadLesson(index) {
            const lesson = lessons[index];
            currentIdx = index;

            // 1. Update Lesson Title
            document.getElementById('lesson-title').innerText = lesson.title;
            
            // 2. Update Video Frame (Fixed ID target)
            document.getElementById('video-frame').src = lesson.video;
            
            // 3. Update Bible Info
            document.getElementById('bible-ref-text').innerText = lesson.bibleRef;
            document.getElementById('bible-frame').src = lesson.bibleUrl;
            document.getElementById('bible-container').style.display = 'none'; 
            
            // 4. Update Quizlet Frame (Fixed ID target)
            document.getElementById('quizlet-game').src = lesson.quizlet;
            
            // 5. Navigation visibility
            document.getElementById('prev-btn').style.visibility = (index === 0) ? 'hidden' : 'visible';
            document.getElementById('next-btn').style.visibility = (index === lessons.length - 1) ? 'hidden' : 'visible';
            
            toggleMenu(false);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function nextLesson() { if(currentIdx < lessons.length - 1) loadLesson(currentIdx + 1); }
        function prevLesson() { if(currentIdx > 0) loadLesson(currentIdx - 1); }
        
        function toggleMenu(open) {
            const menu = document.getElementById('nav-menu');
            if (open === false) menu.classList.remove('active');
            else menu.classList.toggle('active');
        }

        // Initialize
        loadLesson(0);
    </script>
</body>
</html>
